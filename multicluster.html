<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Cluster Equity Pulse — ISI Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 14px; background: #000; min-height: 100vh; }
        .mc-container { max-width: 1200px; margin: 0 auto; }

        .mc-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
        }
        .mc-title { font-size: 0.72rem; color: #00aaff; letter-spacing: 3px; font-weight: bold; }
        .mc-back {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg,#000d1a,#001a33);
            border: 2px solid #00aaff; color: #00aaff;
            padding: 7px 14px; border-radius: 5px; font-weight: bold;
            font-size: 0.7rem; text-decoration: none; letter-spacing: 1px;
        }

        /* RANGE BUTTONS */
        .rng-row {
            display: flex; flex-direction: row; align-items: center;
            gap: 6px; overflow-x: auto; padding-bottom: 4px;
            margin-bottom: 12px; -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .rng-row::-webkit-scrollbar { display: none; }
        .rng-btn {
            flex: 0 0 auto; padding: 6px 13px; border-radius: 4px;
            font-size: 0.62rem; font-weight: bold; cursor: pointer;
            border: 1px solid #333; background: #111; color: #666;
            letter-spacing: 1px; white-space: nowrap; transition: all 0.15s;
        }
        .rng-btn.active { border-color: var(--gold); background: #1a1200; color: var(--gold); }
        .wr-badge {
            flex: 0 0 auto; display: flex; align-items: center; gap: 6px;
            background: #0a0a00; border: 1px solid #2a2a00;
            border-radius: 4px; padding: 5px 11px;
        }
        .wr-label { font-size: 0.55rem; color: #555; letter-spacing: 1px; }
        .wr-val { font-size: 1rem; font-weight: 900; color: var(--gold); }

        /* CHART BOX */
        .chart-box {
            background: #020202; border: 1px solid #111; border-radius: 8px;
            padding: 10px; margin-bottom: 14px; position: relative; height: 220px;
        }
        .chart-box canvas { width: 100% !important; height: 100% !important; }
        .chart-empty {
            display: none; position: absolute; inset: 0;
            align-items: center; justify-content: center;
            color: #333; font-size: 0.75rem; text-align: center;
        }
        .chart-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 0.75rem;
        }

        /* STATS ROW */
        .stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-card {
            background: #060606; border: 1px solid #1a1a1a;
            border-radius: 5px; padding: 8px 14px; min-width: 80px;
        }
        .stat-card .lbl { font-size: 0.55rem; color: #444; letter-spacing: 1px; margin-bottom: 3px; }
        .stat-card .val { font-size: 0.78rem; font-weight: bold; }

        /* CLUSTER LIST */
        .cluster-section { margin-bottom: 8px; background: #040404; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; }
        .cluster-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; background: #060606; cursor: pointer;
        }
        .cluster-header input[type="checkbox"] { accent-color: #00aaff; width: 16px; height: 16px; flex-shrink: 0; }
        .cluster-name { font-size: 0.76rem; font-weight: bold; color: #00aaff; flex: 1; }
        .cluster-count { font-size: 0.58rem; color: #444; }
        .accounts-list { padding: 0 14px 8px; }
        .account-row {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0 6px 8px; border-top: 1px solid #0d0d0d;
        }
        .account-row input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; }
        .acc-name { font-size: 0.68rem; color: #aaa; flex: 1; }
        .acc-bal { font-size: 0.65rem; color: var(--gold); font-family: monospace; }
        .acc-net { font-size: 0.62rem; font-family: monospace; }

        .fb-status { font-size: 0.6rem; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="mc-container">

    <!-- HEADER -->
    <div class="mc-header">
        <div>
            <div class="mc-title">📊 MULTI CLUSTER — INSTITUTIONAL EQUITY PULSE</div>
            <div id="fbStatus" class="fb-status">● Connecting...</div>
        </div>
        <a href="monitoring.html" class="mc-back">← Monitoring</a>
    </div>

    <!-- RANGE BUTTONS -->
    <div class="rng-row">
        <button class="rng-btn" onclick="setRange(0)" id="rng0">WEEKLY</button>
        <button class="rng-btn active" onclick="setRange(1)" id="rng1">MONTHLY</button>
        <button class="rng-btn" onclick="setRange(2)" id="rng2">QUARTERLY</button>
        <button class="rng-btn" onclick="setRange(3)" id="rng3">HALF-YEARLY</button>
        <button class="rng-btn" onclick="setRange(4)" id="rng4">ANNUAL</button>
        <div class="wr-badge">
            <span class="wr-label">WIN RATE</span>
            <span class="wr-val" id="wrVal">0%</span>
        </div>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <div class="chart-loading" id="chartLoading">⏳ Loading trades...</div>
        <canvas id="equityCanvas" style="display:none;"></canvas>
        <div class="chart-empty" id="chartEmpty">No trades found for selected filters.</div>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow"></div>

    <!-- CLUSTER LIST -->
    <div style="font-size:0.55rem;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Filter Clusters & Accounts</div>
    <div id="clusterList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhVpnVtlLMy0laY8U5A5Y8lLY9s3swjkE",
    authDomain: "trading-terminal-b8006.firebaseapp.com",
    projectId: "trading-terminal-b8006",
    storageBucket: "trading-terminal-b8006.firebasestorage.app",
    messagingSenderId: "690730161822",
    appId: "1:690730161822:web:81dabfd7b4575e86860d8f",
    databaseURL: "https://trading-terminal-b8006-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── STATE ──
let clusters   = {};
let liveStats  = {};
let selections = {}; // { cId: { on:bool, nodes:{nIdx:bool} } }
let rangeIdx   = 1;
let chartInst  = null;
const RANGES   = [7, 30, 90, 180, 365];

// ── USD/INR ──
let usdInrRate = 84;
async function loadRate() {
    try {
        const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const j = await r.json();
        usdInrRate = j.rates?.INR || 84;
    } catch(e) {}
}

// ── PULSE COLORS — same as dashboard ──
function pulseColor(t) {
    if (!t) return '#c5a059';
    if (t.type === 'Stop Loss') return '#d32f2f';
    const sc = (t.scale||[]).filter(s=>s&&s.trim()).length;
    return sc >= 2 ? '#00ff41' : sc === 1 ? '#1565c0' : '#00ff41';
}
function glowColor(c) {
    if (c==='#d32f2f') return 'rgba(211,47,47,0.85)';
    if (c==='#1565c0') return 'rgba(21,101,192,0.85)';
    if (c==='#00ff41') return 'rgba(0,255,65,0.85)';
    return 'rgba(197,160,89,0.6)';
}

// ── FIREBASE LOAD ──
onValue(ref(db, 'isi_v6/clusters'), snap => {
    clusters = snap.val() || {};
    document.getElementById('fbStatus').textContent = '● LIVE — Firebase Connected';
    document.getElementById('fbStatus').style.color = '#00c805';

    // Init selections
    Object.entries(clusters).forEach(([cId, cluster]) => {
        if (!selections[cId]) {
            selections[cId] = { on: true, nodes: {} };
            (cluster.nodes||[]).forEach((_,i) => selections[cId].nodes[i] = true);
        }
    });

    buildClusterList();
    loadAndRender();
});

onValue(ref(db, 'isi_v6/stats'), snap => {
    liveStats = snap.val() || {};
    buildClusterList(); // refresh balances
});

// ── RANGE ──
window.setRange = function(idx) {
    rangeIdx = idx;
    for (let i=0;i<5;i++) {
        const b = document.getElementById('rng'+i);
        if (!b) continue;
        b.classList.toggle('active', i===idx);
    }
    loadAndRender();
};

// ── TOGGLE ──
window.toggleCluster = function(cId, on) {
    if (!selections[cId]) selections[cId] = { on, nodes:{} };
    selections[cId].on = on;
    const nd = document.getElementById('nd_'+cId);
    if (nd) nd.style.display = on ? '' : 'none';
    loadAndRender();
};

window.toggleNode = function(cId, nIdx, on) {
    if (!selections[cId]) selections[cId] = { on:true, nodes:{} };
    selections[cId].nodes[nIdx] = on;
    loadAndRender();
};

// ── BUILD CLUSTER LIST ──
function buildClusterList() {
    const list = document.getElementById('clusterList');
    if (!list) return;
    list.innerHTML = '';

    Object.entries(clusters).forEach(([cId, cluster]) => {
        const sel   = selections[cId] || { on:true, nodes:{} };
        const nodes = cluster.nodes || [];

        const nodeRows = nodes.map((node, nIdx) => {
            const stats  = liveStats[cId]?.[String(nIdx)] || {};
            const bal    = (stats.currentBal ?? node.balance ?? 0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
            const net    = stats.net ?? 0;
            const curr   = node.curr || '$';
            const netCol = net >= 0 ? '#00c805' : '#ff3131';
            const chk    = sel.nodes[nIdx] !== false ? 'checked' : '';
            return `<div class="account-row">
                <input type="checkbox" ${chk} onchange="toggleNode('${cId}',${nIdx},this.checked)">
                <span class="acc-name">${node.title||'Account '+(nIdx+1)}</span>
                <span class="acc-bal">${curr}${bal}</span>
                <span class="acc-net" style="color:${netCol}">${net>=0?'+':''}${curr}${Math.abs(net).toFixed(2)}</span>
            </div>`;
        }).join('');

        const cChk = sel.on ? 'checked' : '';
        const sec = document.createElement('div');
        sec.className = 'cluster-section';
        sec.innerHTML = `
            <div class="cluster-header">
                <input type="checkbox" ${cChk} onchange="toggleCluster('${cId}',this.checked)">
                <span class="cluster-name">${cluster.title}</span>
                <span class="cluster-count">${nodes.length} account${nodes.length!==1?'s':''}</span>
            </div>
            <div id="nd_${cId}" class="accounts-list" style="${sel.on?'':'display:none'}">${nodeRows}</div>`;
        list.appendChild(sec);
    });
}

// ── LOAD ALL TRADES & RENDER ──
async function loadAndRender() {
    const canvas   = document.getElementById('equityCanvas');
    const loading  = document.getElementById('chartLoading');
    const emptyEl  = document.getElementById('chartEmpty');

    loading.style.display = 'flex';
    canvas.style.display  = 'none';
    emptyEl.style.display = 'none';

    await loadRate();

    // Load trades for each selected cluster from Firebase
    const allTrades = [];

    const promises = Object.entries(clusters).map(([cId, cluster]) => {
        const sel = selections[cId];
        if (!sel || !sel.on) return Promise.resolve();
        const nodes = cluster.nodes || [];

        const nodePr = nodes.map((node, nIdx) => {
            if (sel.nodes[nIdx] === false) return Promise.resolve();
            return get(ref(db, `isi_v6/clusters/${cId}/nodes/${nIdx}/tradeHistory`))
                .then(snap => {
                    const val = snap.val();
                    if (!val) return;
                    Object.values(val).forEach(trade => {
                        if (trade && trade.date) {
                            allTrades.push({
                                ...trade,
                                _cId:       cId,
                                _nIdx:      nIdx,
                                _nodeTitle: node.title || 'Account '+(nIdx+1),
                                _curr:      node.curr || '$'
                            });
                        }
                    });
                })
                .catch(()=>{});
        });
        return Promise.all(nodePr);
    });

    await Promise.all(promises);

    // Sort chronologically
    allTrades.sort((a,b) => {
        const d = (a.date||'').localeCompare(b.date||'');
        return d !== 0 ? d : (a.savedAt||'').localeCompare(b.savedAt||'');
    });

    // Apply range
    const maxT     = RANGES[rangeIdx];
    const hist     = allTrades.slice(-maxT);

    // Start balance
    let startBal = 0;
    Object.entries(clusters).forEach(([cId, cluster]) => {
        const sel = selections[cId];
        if (!sel || !sel.on) return;
        (cluster.nodes||[]).forEach((node, nIdx) => {
            if (sel.nodes[nIdx] !== false) startBal += (node.balance ?? 0);
        });
    });

    // Build equity curve
    let running = startBal;
    const eqPts = [running];
    hist.forEach(t => {
        const pl = (t._curr==='₹') ? (t.pl||0)/usdInrRate : (t.pl||0);
        running += pl;
        eqPts.push(parseFloat(running.toFixed(2)));
    });

    const wins = hist.filter(t=>t.type==='Target').length;
    const wr   = hist.length ? ((wins/hist.length)*100).toFixed(1) : 0;
    document.getElementById('wrVal').textContent = wr + '%';

    loading.style.display = 'none';

    if (!hist.length) {
        emptyEl.style.display = 'flex';
        document.getElementById('statsRow').innerHTML = '';
        return;
    }

    canvas.style.display = '';

    // Colors + labels
    const ptColors = eqPts.map((_,i) => i===0 ? '#c5a059' : pulseColor(hist[i-1]));
    const labels   = eqPts.map((_,i) => {
        if(i===0) return 'Start';
        const t = hist[i-1];
        return t?.date ? t.date.slice(5) : 'T'+i;
    });

    if (chartInst) { chartInst.destroy(); chartInst = null; }
    const c2d = canvas.getContext('2d');

    const glowPlugin = {
        id: 'mcGlow',
        afterDatasetsDraw(chart) {
            chart.getDatasetMeta(0).data.forEach((pt,i) => {
                const col = ptColors[i];
                c2d.save();
                c2d.shadowColor=glowColor(col); c2d.shadowBlur=18;
                c2d.beginPath(); c2d.arc(pt.x,pt.y,5,0,Math.PI*2); c2d.fillStyle=col; c2d.fill();
                c2d.shadowBlur=8;
                c2d.beginPath(); c2d.arc(pt.x,pt.y,3,0,Math.PI*2); c2d.fillStyle=col; c2d.fill();
                c2d.restore();
            });
        }
    };

    chartInst = new Chart(c2d, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: eqPts,
                segment: { borderColor: ctx => ptColors[ctx.p1DataIndex]||'#c5a059' },
                borderWidth: 1.5,
                pointRadius: 5, pointHoverRadius: 8,
                pointBackgroundColor: ctx => ptColors[ctx.dataIndex]||'#c5a059',
                pointBorderColor:     ctx => ptColors[ctx.dataIndex]||'#c5a059',
                pointBorderWidth: 1, tension: 0.35, fill: false
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 300 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: items => {
                            const i = items[0].dataIndex;
                            if (i===0) return 'Starting Balance';
                            const t = hist[i-1];
                            return t ? `${t.date} — ${t._nodeTitle}` : items[0].label;
                        },
                        label: item => {
                            const i=item.dataIndex, bal=item.parsed.y;
                            if(i===0) return `Balance: $${bal.toLocaleString('en-US',{minimumFractionDigits:2})}`;
                            const t=hist[i-1]; if(!t) return `$${bal.toFixed(2)}`;
                            const sc=(t.scale||[]).filter(s=>s).length;
                            const out=t.type==='Stop Loss'?'🔴 SL':sc>=2?'🟢 FULL WIN':'🔵 PARTIAL';
                            return [out,`P/L: $${(t.pl||0).toFixed(2)}`,`Bal: $${bal.toLocaleString('en-US',{minimumFractionDigits:2})}`];
                        }
                    },
                    backgroundColor:'#0d1117', borderColor:'#2a2a2a', borderWidth:1,
                    titleColor:'#c5a059', bodyColor:'#aaa', padding:10
                }
            },
            scales: {
                y: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#555',font:{size:9},callback:v=>'$'+v.toLocaleString()} },
                x: { grid:{display:false}, ticks:{color:'#444',font:{size:9},maxRotation:45,maxTicksLimit:12} }
            }
        },
        plugins: [glowPlugin]
    });

    // Stats
    const net  = eqPts[eqPts.length-1] - eqPts[0];
    const plC  = net>=0 ? '#00c805' : '#ff3131';
    document.getElementById('statsRow').innerHTML = [
        ['NET P/L', `<span style="color:${plC};font-family:monospace;">${net>=0?'+':''}$${Math.abs(net).toFixed(2)}</span>`],
        ['WIN RATE', `<span style="color:var(--gold);font-family:monospace;">${wr}%</span>`],
        ['TRADES', `<span style="color:#ccc;font-family:monospace;">${hist.length}</span>`],
        ['W / L', `<span style="color:#00c805;">${wins}</span> / <span style="color:#ff3131;">${hist.length-wins}</span>`]
    ].map(([l,v]) => `<div class="stat-card"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join('');
}
</script>
</body>
</html>
